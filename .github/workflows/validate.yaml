name: HACS Validation

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: Validate HACS
        uses: "hacs/action@main"
        with:
          category: "plugin"